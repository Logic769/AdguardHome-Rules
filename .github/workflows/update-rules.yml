name: жҝҖиҝӣи§„еҲҷ

permissions:
  contents: write

on:
  push:
    branches:
      - main
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'

jobs:
  build-and-commit-main:
    # push ж—¶д»…еңЁ main еҲҶж”Ҝи§ҰеҸ‘пјӣschedule/жүӢеҠЁи§ҰеҸ‘еҲҷз…§еёёжү§иЎҢ
    if: github.event_name != 'push' || github.ref_name == 'main'
    runs-on: ubuntu-latest
    concurrency:
      group: ${{ github.workflow }}-main
      cancel-in-progress: true

    steps:
      - name: Checkout main branch
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Build lists and update README (main)
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_REF_NAME: main
          OUTPUT_BLOCK_FILENAME: Black.txt
          OUTPUT_WHITE_FILENAME: White.txt
          OUTPUT_CONFLICT_FILENAME: Conflict.txt
          README_TITLE: жҝҖиҝӣзҡ„и§„еҲҷ
          RELEASE_TAG: stable-latest
        run: python documents/process_rules.py

      - name: Compute Beijing time for release title (main)
        id: time_main
        run: |
          echo "cn_time=$(TZ=Asia/Shanghai date '+%Y-%m-%d %H:%M:%S (UTC+8)')" >> $GITHUB_OUTPUT

      - name: Prepare release body (main)
        run: |
          BLOCK_COUNT=$(grep -v -c '^!' Black.txt || echo 0)
          WHITE_COUNT=$(grep -v -c '^!' White.txt || echo 0)
          CONFLICT_COUNT=$(grep -v -c '^!' Conflict.txt || echo 0)
          {
            echo "жҝҖиҝӣзҡ„и§„еҲҷпјҲmain еҲҶж”Ҝпјүжң¬ж¬Ўжһ„е»әз»ҹи®Ў"
            echo
            echo "- й»‘еҗҚеҚ•и§„еҲҷ: ${BLOCK_COUNT} жқЎ"
            echo "- зҷҪеҗҚеҚ•и§„еҲҷ: ${WHITE_COUNT} жқЎ"
            echo "- еҶІзӘҒи§„еҲҷ: ${CONFLICT_COUNT} жқЎ"
          } > release_body_main.md

      - name: Generate release tag
        id: generate_tag
        run: |
          echo "tag=stable-$(date +'%Y%m%d%H%M%S')" >> $GITHUB_OUTPUT

      - name: Upload lists to GitHub Release (main)
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ steps.generate_tag.outputs.tag }}
          name: "жҝҖиҝӣзҡ„и§„еҲҷ ${{ steps.time_main.outputs.cn_time }}"
          bodyFile: release_body_main.md
          makeLatest: true
          allowUpdates: false
          replacesArtifacts: false
          token: ${{ secrets.GITHUB_TOKEN }}
          artifacts: "Black.txt,White.txt,Conflict.txt"

      - name: Commit and push README only to main (safe rebase)
        run: |
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions@github.com"

          git fetch origin main
          git config --global pull.rebase true
          git config --global rebase.autoStash true
          git pull --rebase origin main || true

          git add README.md
          if git diff --cached --quiet; then
            echo "No README changes to commit."
            exit 0
          fi

          git commit -m "docs(main): жӣҙж–° README"

          git fetch origin main
          git pull --rebase origin main || true

          git push origin "HEAD:main" || {
            echo "First push failed, attempting with --force-with-lease"
            git push --force-with-lease origin "HEAD:main"
          }
