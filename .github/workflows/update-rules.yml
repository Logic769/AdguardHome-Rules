name: 平稳的规则

permissions:
  contents: write

on:
  push:
    branches:
      - main
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'

jobs:
  update-both-branches:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        branch: [main, radical]
        include:
          - branch: main
            block_file: Black.txt
            white_file: White.txt
            readme_title: 平稳的规则
            release_tag: stable-latest
          - branch: radical
            block_file: radical-Black.txt
            white_file: radical-White.txt
            readme_title: 激进的规则
            release_tag: radical-latest

    steps:
      - name: Checkout repository (target branch)
        uses: actions/checkout@v4
        with:
          ref: ${{ matrix.branch }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run script to build lists and update README
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_REF_NAME: ${{ matrix.branch }}
          OUTPUT_BLOCK_FILENAME: ${{ matrix.block_file }}
          OUTPUT_WHITE_FILENAME: ${{ matrix.white_file }}
          README_TITLE: ${{ matrix.readme_title }}
          RELEASE_TAG: ${{ matrix.release_tag }}
        run: python documents/process_rules.py

      - name: Upload lists to GitHub Release
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ matrix.release_tag }}
          name: "${{ matrix.readme_title }} Latest"
          makeLatest: true
          allowUpdates: true
          replacesArtifacts: true
          token: ${{ secrets.GITHUB_TOKEN }}
          artifacts: "${{ matrix.block_file }},${{ matrix.white_file }}"

      - name: Commit and push README only
        env:
          BRANCH: ${{ matrix.branch }}
          BLOCK_FILE: ${{ matrix.block_file }}
          WHITE_FILE: ${{ matrix.white_file }}
        run: |
          # 配置 Git 身份
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions@github.com"

          # 仅添加 README，避免将超大文件加入 Git 历史
          git add README.md

          # 若 README 没变化则跳过提交
          if git diff --cached --quiet; then
            echo "No README changes to commit."
            exit 0
          fi

          # 统计最新文件的规则数（用于日志）
          BLOCK_COUNT=$(grep -v -c '^!' "$BLOCK_FILE" || echo 0)
          WHITE_COUNT=$(grep -v -c '^!' "$WHITE_FILE" || echo 0)

          git commit -m "chore: 更新 README ($BRANCH)" \
                     -m "黑名单规则: ${BLOCK_COUNT} 条" \
                     -m "白名单规则: ${WHITE_COUNT} 条"

          git push origin "HEAD:${BRANCH}"
